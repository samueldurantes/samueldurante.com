baseURL: https://samueldurante.com/
title: Samuel Durante
enableGitInfo: true

params:
  github:
    url: https://github.com/samueldurantes

  twitter:
    url: https://x.com/samueldurantes

  repo:
    url: https://github.com/samueldurantes/samueldurante.com
    branch: main

  tmdb:
